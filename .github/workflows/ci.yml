name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Backend tests — Linux / macOS 에서 전체 pytest 실행
  # Windows 는 import smoke test 만 수행 (semgrep/weasyprint 네이티브 미지원)
  # -------------------------------------------------------------------------
  backend:
    name: Backend — ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            python: "3.12"
            mode: full
          - os: macos-14
            python: "3.12"
            mode: full
          - os: windows-2022
            python: "3.12"
            mode: smoke
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml

      # Linux: WeasyPrint 네이티브 의존성
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 \
            libffi-dev shared-mime-info

      # macOS: WeasyPrint 네이티브 의존성
      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install pango cairo libffi

      - name: Install aisast (full)
        if: matrix.mode == 'full'
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Install aisast (smoke — skip heavy extras)
        if: matrix.mode == 'smoke'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Windows 는 weasyprint 네이티브 deps 가 GTK3 필요라 생략
          # 핵심 의존성만 설치해 import smoke 용으로 사용
          pip install "fastapi>=0.115" "uvicorn[standard]>=0.30" \
                      "pydantic[email]>=2.7" "pydantic-settings>=2.3" \
                      "sqlalchemy>=2.0" "typer>=0.12" "rich>=13.7" \
                      "httpx>=0.27" "bcrypt>=4.1" "python-jose[cryptography]>=3.3" \
                      "pyyaml>=6.0" "jinja2>=3.1" "celery>=5.4" "redis>=5.0" \
                      "openpyxl>=3.1" "minio>=7.2" "python-multipart>=0.0.9" \
                      "alembic>=1.13" "anthropic>=0.39" "psycopg2-binary>=2.9" \
                      "email-validator>=2.2" "pytest>=8.2" "pytest-asyncio>=0.23"
          pip install -e . --no-deps

      - name: Smoke import test (Windows only)
        if: matrix.mode == 'smoke'
        run: |
          python -c "import aisast, aisast.api.app, aisast.cli, aisast.plugins, aisast.services; print('ok')"
          python -c "from aisast.orchestrator.celery_app import recommended_pool; assert recommended_pool() == 'solo', 'expected solo on Windows'; print('celery pool = solo')"

      - name: Run pytest
        if: matrix.mode == 'full'
        run: pytest -q --tb=short --cov=aisast --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        if: matrix.mode == 'full' && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Run mypy (non-blocking)
        if: matrix.mode == 'full'
        run: mypy aisast --ignore-missing-imports || true

      - name: Run pip-audit (non-blocking)
        if: matrix.mode == 'full'
        run: |
          pip install pip-audit
          pip-audit || true

      - name: MOIS catalog assertion
        if: matrix.mode == 'full'
        run: |
          python -c "from aisast.mois import MOIS_ITEMS; assert len(MOIS_ITEMS) == 49, f'expected 49, got {len(MOIS_ITEMS)}'"

  # -------------------------------------------------------------------------
  # Frontend tests — 모든 OS 에서 동일하게 통과해야 함
  # -------------------------------------------------------------------------
  frontend:
    name: Frontend — ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Run vitest
        run: npm test

      - name: Type-check
        run: npx tsc -b --noEmit

  # -------------------------------------------------------------------------
  # Docker multi-arch buildx — linux/amd64 + linux/arm64
  # PR 은 빌드만 하고 main push 시점에만 push (레지스트리 설정 후)
  # -------------------------------------------------------------------------
  docker-buildx:
    name: Docker buildx (amd64+arm64)
    runs-on: ubuntu-24.04
    needs: [backend, frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image (multi-arch, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: aisast:ci-${{ github.sha }}

      - name: Build frontend image (multi-arch, no push)
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: aisast-frontend:ci-${{ github.sha }}

  # -------------------------------------------------------------------------
  # Self-SAST — aisast 가 자기 자신의 Python 코드를 스캔해 회귀 확인
  # -------------------------------------------------------------------------
  self-sast:
    name: Self-SAST (aisast scans itself)
    runs-on: ubuntu-24.04
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libcairo2 libpangoft2-1.0-0 shared-mime-info
      - name: Install aisast + engines
        run: |
          pip install -e '.[dev]'
          pip install "semgrep>=1.70" "bandit[sarif]>=1.7"
      - name: Run aisast scan
        run: |
          aisast scan ./aisast --no-second-pass --no-triage -o self-scan.sarif --json self-scan.json || true
          python -c "
          import json
          data = json.load(open('self-scan.json'))
          high = sum(1 for f in data['findings'] if f['severity'] == 'HIGH')
          print(f'HIGH findings: {high}')
          assert high == 0, 'aiSAST 내부에서 HIGH 심각도 탐지됨 — PR 병합 전 해결 필요'
          "
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-sast-sarif
          path: self-scan.sarif
