# 사용자 정의 레퍼런스 매핑 예시.
#
# OPENSAST_REFERENCE_STANDARDS_PATH=/etc/opensast/refs_override.yaml 로 지정하면
# CWE → 표준 매핑이 내장 OWASP/SANS/PCI 매핑 위에 **추가** 된다.
#
# 사용 시나리오:
# - 최신 OWASP Top 10 개정판을 코드 수정 없이 반영
# - 기관 내부 보안 표준(예: KISA-KSG, ISO 27001) 매핑

mappings:
  "CWE-89":
    - standard: "KISA-KSG-2024"
      id: "DB-001"
      title: "데이터베이스 입력 검증 필수"
      url: "https://www.kisa.or.kr/"
    - standard: "ISO-27001"
      id: "A.14.2.5"
      title: "Secure system engineering principles"
      url: ""

  "CWE-79":
    - standard: "KISA-KSG-2024"
      id: "WEB-003"
      title: "출력 이스케이프 필수"
      url: ""
