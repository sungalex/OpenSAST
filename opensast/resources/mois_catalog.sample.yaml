# MOIS 카탈로그 오버라이드 예시.
#
# AISAST_MOIS_CATALOG_PATH=/etc/aisast/mois_override.yaml 환경변수로 이 파일을
# 가리키면 내장 49개 카탈로그 위에 병합된다. `id` 가 기존 항목과 겹치면 전체
# 속성을 덮어쓴다. 새로운 ID 는 추가로 등록된다.
#
# 사용 시나리오:
# - 행안부 가이드 개정판 항목 반영 (SR-N 추가)
# - 기관별 내부 룰 코드로 항목 확장 (예: ORG-SR-101)
# - Python 수정 없이 장기 유지보수

items:
  - id: "SR1-1"
    name_kr: "SQL 삽입 (행안부 개정판)"
    name_en: "SQL Injection"
    category: "입력데이터 검증 및 표현"
    cwe_ids: ["CWE-89", "CWE-564"]
    severity: "HIGH"
    primary_engines: ["opengrep"]
    secondary_engines: ["codeql", "spotbugs"]
    description: "오버라이드 예시 — 파라미터 바인딩 강제"

  - id: "ORG-SR-101"
    name_kr: "내부 API 키 하드코드"
    name_en: "Hard-coded internal API key"
    category: "보안기능"
    cwe_ids: ["CWE-798"]
    severity: "HIGH"
    primary_engines: ["opengrep"]
    description: "우리 기관 전용 항목 — pre-prod 환경 배포 차단"
