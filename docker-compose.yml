version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opensast
      POSTGRES_PASSWORD: opensast
      POSTGRES_DB: opensast
    ports:
      - "5432:5432"
    volumes:
      - opensast-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensast"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      # redis:7-alpine 이 VOLUME /data 를 선언하므로 named volume 을 명시하지
      # 않으면 compose up 마다 UUID 익명 볼륨이 새로 생성된다. 고정 이름으로
      # 묶어 잔재를 방지한다.
      - opensast-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - opensast-ollama:/root/.ollama

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      OPENSAST_DATABASE_URL: postgresql+psycopg2://opensast:opensast@postgres:5432/opensast
      OPENSAST_REDIS_URL: redis://redis:6379/0
      OPENSAST_CELERY_BROKER_URL: redis://redis:6379/1
      OPENSAST_CELERY_RESULT_BACKEND: redis://redis:6379/2
      OPENSAST_OLLAMA_HOST: http://ollama:11434
      OPENSAST_LLM_PROVIDER: ollama
      OPENSAST_BOOTSTRAP_ADMIN_EMAIL: admin@opensast.local
      OPENSAST_BOOTSTRAP_ADMIN_PASSWORD: opensast-admin
      OPENSAST_WORK_DIR: /var/opensast-work
    ports:
      - "8000:8000"
    volumes:
      - ./rules:/app/rules:ro
      - ./.opensast-work:/var/opensast-work

  worker:
    build: .
    command: celery -A opensast.orchestrator.celery_app.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      - redis
      - postgres
    environment:
      OPENSAST_DATABASE_URL: postgresql+psycopg2://opensast:opensast@postgres:5432/opensast
      OPENSAST_CELERY_BROKER_URL: redis://redis:6379/1
      OPENSAST_CELERY_RESULT_BACKEND: redis://redis:6379/2
      OPENSAST_LLM_PROVIDER: ollama
      OPENSAST_OLLAMA_HOST: http://ollama:11434
      OPENSAST_WORK_DIR: /var/opensast-work
    volumes:
      - ./rules:/app/rules:ro
      - ./.opensast-work:/var/opensast-work

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      NODE_ENV: development
      VITE_API_TARGET: http://api:8000
    # NOTE: 호스트 소스 바인드 마운트 + chokidar 폴링 조합이 macOS Docker Desktop 에서
    # Vite 이벤트 루프를 D-state 로 묶어 HTTP 요청을 멈춘다. 안정성을 위해 빌드 타임에
    # 구운 이미지 소스를 그대로 사용한다 (HMR 없음). 소스 수정 후:
    #   docker compose build frontend && docker compose up -d frontend
    tty: true
    stdin_open: true
    depends_on:
      - api

volumes:
  opensast-postgres:
  opensast-redis:
  opensast-ollama:
  # 파일 스토리지(`./.opensast-work`)는 호스트 프로젝트 폴더를 api·worker 에
  # bind-mount 로 공유하므로 named volume 선언이 필요 없다. 프로젝트 폴더 삭제
  # 시 스토리지도 함께 제거된다 (프로젝트와 생명주기 일치). 멀티 노드 확장 시
  # NFS/CSI 공유 볼륨 검토는 범위 밖.
