rules:
  - id: mois-sr1-5-js-file-upload-no-filter
    metadata:
      mois_id: "SR1-5"
      cwe: "CWE-434"
      category: "입력데이터 검증 및 표현"
      severity: "HIGH"
      description: "multer 파일 업로드 시 fileFilter 미설정으로 모든 파일 유형 허용"
      remediation: "multer의 fileFilter 옵션으로 허용 파일 확장자와 MIME 타입을 검증하세요."
    languages: [javascript, typescript]
    severity: ERROR
    message: |
      multer 파일 업로드에 fileFilter가 미설정입니다. SR1-5 위험한 형식 파일 업로드 (CWE-434).
      fileFilter로 허용 확장자를 제한하세요.
    patterns:
      - pattern-either:
          - pattern: "multer({ dest: $DEST })"
          - pattern: "multer({ storage: $STORAGE })"
      - pattern-not:
          - pattern: "multer({ ..., fileFilter: $FILTER, ... })"

  - id: mois-sr1-6-js-open-redirect
    metadata:
      mois_id: "SR1-6"
      cwe: "CWE-601"
      category: "입력데이터 검증 및 표현"
      severity: "HIGH"
      description: "사용자 입력을 검증 없이 res.redirect에 전달"
      remediation: "리다이렉트 대상 URL을 화이트리스트로 검증하세요."
    languages: [javascript, typescript]
    severity: ERROR
    message: |
      사용자 입력값을 검증 없이 redirect에 전달합니다. SR1-6 오픈 리다이렉트 (CWE-601).
      화이트리스트 기반 URL 검증을 적용하세요.
    patterns:
      - pattern-either:
          - pattern: res.redirect(req.query.$URL)
          - pattern: res.redirect(req.body.$URL)
          - pattern: res.redirect(req.params.$URL)
          - pattern: res.redirect(req.query["..."])
          - pattern: res.redirect(req.body["..."])

  - id: mois-sr1-7-js-xxe
    metadata:
      mois_id: "SR1-7"
      cwe: "CWE-611"
      category: "입력데이터 검증 및 표현"
      severity: "HIGH"
      description: "xml2js 또는 libxmljs에서 외부 엔티티 파싱 미제한"
      remediation: "xml2js는 entityExpansion을 비활성하고, libxmljs는 noent: false로 설정하세요."
    languages: [javascript, typescript]
    severity: ERROR
    message: |
      안전하지 않은 XML 파서 설정입니다. SR1-7 XML 외부 엔티티 삽입 (CWE-611).
      XML 외부 엔티티를 비활성화하세요.
    patterns:
      - pattern-either:
          - pattern: xml2js.parseString($INPUT, ...)
          - pattern: new xml2js.Parser(...)
          - pattern: "libxmljs.parseXml($INPUT, { ..., noent: true, ... })"
          - pattern: "libxmljs.parseXmlString($INPUT, { ..., noent: true, ... })"

  - id: mois-sr1-10-js-no-csrf
    metadata:
      mois_id: "SR1-10"
      cwe: "CWE-352"
      category: "입력데이터 검증 및 표현"
      severity: "HIGH"
      description: "Express POST 라우트에 CSRF 보호 미들웨어 없음"
      remediation: "csurf 또는 csrf-csrf 미들웨어를 적용하세요."
    languages: [javascript, typescript]
    severity: ERROR
    message: |
      POST 라우트에 CSRF 보호가 없습니다. SR1-10 크로스사이트 요청 위조 (CWE-352).
      csurf 미들웨어를 적용하세요.
    patterns:
      - pattern-either:
          - pattern: app.post($PATH, function($REQ, $RES) { ... })
          - pattern: app.post($PATH, ($REQ, $RES) => { ... })
          - pattern: app.post($PATH, async ($REQ, $RES) => { ... })
          - pattern: router.post($PATH, function($REQ, $RES) { ... })
          - pattern: router.post($PATH, ($REQ, $RES) => { ... })
          - pattern: router.post($PATH, async ($REQ, $RES) => { ... })

  - id: mois-sr1-12-js-http-response-splitting
    metadata:
      mois_id: "SR1-12"
      cwe: "CWE-113"
      category: "입력데이터 검증 및 표현"
      severity: "HIGH"
      description: "응답 헤더에 사용자 입력 직접 삽입"
      remediation: "사용자 입력을 헤더에 삽입하기 전 CRLF 문자를 제거하세요."
    languages: [javascript, typescript]
    severity: ERROR
    message: |
      사용자 입력을 응답 헤더에 직접 삽입합니다. SR1-12 HTTP 응답 분할 (CWE-113).
      헤더에 삽입 전 CRLF 문자를 필터링하세요.
    patterns:
      - pattern-either:
          - pattern: res.setHeader($NAME, req.query.$VAL)
          - pattern: res.setHeader($NAME, req.body.$VAL)
          - pattern: res.setHeader($NAME, req.params.$VAL)
          - pattern: res.set($NAME, req.query.$VAL)
          - pattern: res.header($NAME, req.query.$VAL)
