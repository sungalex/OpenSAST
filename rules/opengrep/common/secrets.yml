rules:
  - id: mois-sr2-6-hardcoded-password
    metadata:
      mois_id: "SR2-6"
      cwe: "CWE-798"
      category: "보안기능"
      severity: "HIGH"
    languages: [java, python, javascript, typescript, go]
    severity: ERROR
    message: |
      하드코드된 비밀번호/비밀키가 발견되었습니다. SR2-6 하드코드된 중요정보.
      환경변수·Vault·KMS 등으로 분리하세요.
    pattern-regex: "(?i)(password|passwd|secret|api[_-]?key|access[_-]?token)\\s*[:=]\\s*[\"'][A-Za-z0-9!@#$%^&*()_\\-]{6,}[\"']"

  - id: mois-sr2-6-aws-access-key
    metadata:
      mois_id: "SR2-6"
      cwe: "CWE-798"
      category: "보안기능"
      severity: "HIGH"
    languages: [java, python, javascript, typescript, go, yaml, json]
    severity: ERROR
    message: "AWS Access Key가 하드코드되어 있습니다. SR2-6 하드코드된 중요정보."
    pattern-regex: "AKIA[0-9A-Z]{16}"

  - id: mois-sr2-6-private-key
    metadata:
      mois_id: "SR2-6"
      cwe: "CWE-798"
      category: "보안기능"
      severity: "HIGH"
    languages: [java, python, javascript, typescript, go, yaml, json]
    severity: ERROR
    message: "PEM 형식 개인키가 저장소에 포함되어 있습니다. SR2-6."
    pattern-regex: "-----BEGIN (RSA|DSA|EC|OPENSSH|PRIVATE) PRIVATE KEY-----"

  - id: mois-sr6-2-debug-print
    metadata:
      mois_id: "SR6-2"
      cwe: "CWE-489"
      category: "캡슐화"
      severity: "LOW"
    languages: [java]
    severity: WARNING
    message: "System.out.println/printStackTrace는 제거되지 않은 디버그 코드. SR6-2."
    patterns:
      - pattern-either:
          - pattern: System.out.println(...)
          - pattern: $EX.printStackTrace()

  - id: mois-sr4-1-python-stack-trace
    metadata:
      mois_id: "SR4-1"
      cwe: "CWE-209"
      category: "에러처리"
      severity: "MEDIUM"
    languages: [python]
    severity: WARNING
    message: "traceback을 응답에 포함하면 민감 정보가 노출됩니다. SR4-1."
    patterns:
      - pattern: return $RESP(traceback.format_exc())
