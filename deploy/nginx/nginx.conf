user  nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    client_max_body_size 500M;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # 업로드 / WebSocket / SPA 프록시
    upstream opensast_api {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        # 프로덕션에서는 HTTPS 리다이렉트 (주석 해제)
        # return 301 https://$host$request_uri;

        # 1) 정적 프론트엔드
        root /usr/share/nginx/html;
        index index.html;

        # 2) API 프록시
        location /api/ {
            proxy_pass         http://opensast_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering    off;
        }

        # 3) OpenAPI docs 프록시 (cloud 프로파일이면 비활성)
        location /docs {
            proxy_pass http://opensast_api;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://opensast_api;
        }

        # 4) 헬스체크
        location = /health {
            proxy_pass http://opensast_api/health;
            access_log off;
        }

        # 5) SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 6) 보안 헤더 (API 응답은 FastAPI 미들웨어가 추가하지만 nginx 에서도 이중 방어)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "DENY" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy     "geolocation=(), camera=(), microphone=()" always;
        # 프로덕션 HTTPS 활성 후 주석 해제
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # HTTPS 블록 템플릿 (TLS 인증서 마운트 후 활성)
    # server {
    #     listen 443 ssl http2;
    #     server_name sast.example.com;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     include /etc/nginx/conf.d/opensast-common.conf;
    # }
}
